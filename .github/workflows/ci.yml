  per30-configured-turn-proof:
    name: PER-30 configured TURN proof
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: ${{ github.head_ref == 'multica/P3-T09-configured-turn-proof' || github.ref_name == 'multica/P3-T09-configured-turn-proof' }}
    env:
      DISCRYPT_PUBLIC_MQTT_ENDPOINT: mqtts://broker.emqx.io:8883
      DISCRYPT_PUBLIC_TURN_E2E: "1"
      DISCRYPT_PUBLIC_TURN_ENDPOINT: turn:127.0.0.1:3478
      DISCRYPT_PUBLIC_TURN_USERNAME: discrypt-ci
      DISCRYPT_PUBLIC_TURN_CREDENTIAL: discrypt-ci-turn-secret
      DISCRYPT_PUBLIC_TURN_ARTIFACT_PATH: target/e2e/per-30-configured-turn-proof/public-turn-relay-only.json
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.96.0
      - name: Install coturn
        run: |
          sudo apt-get update
          sudo apt-get install -y coturn
      - name: Start loopback coturn with CI-only credentials
        run: |
          cat > "${RUNNER_TEMP}/discrypt-coturn.conf" <<'EOF'
          listening-port=3478
          listening-ip=127.0.0.1
          relay-ip=127.0.0.1
          min-port=49160
          max-port=49200
          fingerprint
          lt-cred-mech
          realm=discrypt-ci.local
          user=discrypt-ci:discrypt-ci-turn-secret
          no-cli
          no-tcp
          no-tls
          no-dtls
          allow-loopback-peers
          no-multicast-peers
          log-file=stdout
          EOF
          turnserver -c "${RUNNER_TEMP}/discrypt-coturn.conf" > "${RUNNER_TEMP}/discrypt-coturn.log" 2>&1 &
          echo "$!" > "${RUNNER_TEMP}/discrypt-coturn.pid"
          sleep 3
          ps -p "$(cat "${RUNNER_TEMP}/discrypt-coturn.pid")"
      - name: Run configured TURN relay-only proof
        run: |
          cargo test -p discrypt-transport --features mqtt-adapter --test public_webrtc_datachannel_e2e public_mqtt_relay_only_turn_fallback_roundtrip_when_configured -- --nocapture
          node scripts/check-configured-turn-proof-p3-t09.mjs
      - name: Capture coturn log
        if: always()
        run: |
          mkdir -p target/e2e/per-30-configured-turn-proof
          cp "${RUNNER_TEMP}/discrypt-coturn.log" target/e2e/per-30-configured-turn-proof/coturn.log || true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: per30-configured-turn-proof-${{ github.run_id }}-${{ github.run_attempt }}
          path: target/e2e/per-30-configured-turn-proof
