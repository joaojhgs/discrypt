name: ci

on:
  push:
  pull_request:

jobs:
  rust:
    name: rust (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.96.0
        with:
          components: rustfmt, clippy
      - run: cargo fmt --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo test --workspace

  android-check:
    name: android target check
    runs-on: ubuntu-latest
    env:
      ANDROID_API_LEVEL: "35"
      ANDROID_NDK_VERSION: "28.0.13004108"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.96.0
        with:
          targets: aarch64-linux-android
      - uses: android-actions/setup-android@v3
      - name: Install Android NDK for cargo target check
        run: |
          sdkmanager --install "ndk;${ANDROID_NDK_VERSION}"
          ndk_home="${ANDROID_HOME}/ndk/${ANDROID_NDK_VERSION}"
          llvm_bin="${ndk_home}/toolchains/llvm/prebuilt/linux-x86_64/bin"
          {
            echo "ANDROID_NDK_HOME=${ndk_home}"
            echo "NDK_HOME=${ndk_home}"
            echo "CC_aarch64_linux_android=${llvm_bin}/aarch64-linux-android${ANDROID_API_LEVEL}-clang"
            echo "AR_aarch64_linux_android=${llvm_bin}/llvm-ar"
            echo "CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER=${llvm_bin}/aarch64-linux-android${ANDROID_API_LEVEL}-clang"
          } >> "$GITHUB_ENV"
      - run: cargo check --workspace --target aarch64-linux-android

  production-storage:
    name: production-storage keyring preflight
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.96.0
      - name: Install Linux Secret Service build and test dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y dbus-x11 gnome-keyring libdbus-1-dev pkg-config
      - name: Test production-storage preflight regressions
        run: |
          cargo test -p discrypt-storage --features production-storage keychain_preflight -- --nocapture
          cargo test -p discrypt-storage --features production-storage invalid_os_keychain_wrapping_key_length_is_rejected -- --nocapture
          cargo test -p discrypt-storage --features production-storage existing_encrypted_app_db_missing_vault_key_fails_closed_without_overwrite -- --nocapture
      - name: Install release-baseline Rust 1.89.0 toolchain
        run: rustup toolchain install 1.89.0 --profile minimal --no-self-update
      - name: Test production-storage release-baseline gates
        run: |
          RUSTUP_TOOLCHAIN=1.89.0 cargo test -p discrypt-storage --features production-storage production_passphrase_vault_app_db_survives_fresh_instance_with_same_password -- --nocapture
          RUSTUP_TOOLCHAIN=1.89.0 cargo test -p discrypt-storage --features production-storage existing_encrypted_app_db_missing_vault_key_fails_closed_without_overwrite -- --nocapture
      - name: Live GNOME Secret Service save-load-delete preflight
        env:
          DISCRYPT_LINUX_SECRET_SERVICE_E2E: "1"
        run: |
          dbus-run-session -- bash -euxo pipefail -c '
            export XDG_RUNTIME_DIR="${RUNNER_TEMP}/discrypt-keyring-runtime"
            mkdir -p "${XDG_RUNTIME_DIR}"
            chmod 700 "${XDG_RUNTIME_DIR}"
            eval "$(printf "\n" | gnome-keyring-daemon --unlock --components=secrets)"
            cargo test -p discrypt-storage linux_secret_service_keychain_live_roundtrip_when_enabled --features production-storage -- --nocapture
          '

  supply-chain:
    name: supply-chain
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.96.0
      - uses: actions/cache@v4
        with:
          path: ~/.cargo/bin
          key: cargo-tools-${{ runner.os }}-audit-deny-sbom-v1
      - name: Install supply-chain tools
        run: |
          cargo install cargo-audit --locked || true
          cargo install cargo-deny --locked || true
          cargo install cargo-sbom --locked || true
      - run: cargo audit
      - run: cargo deny check
      - run: mkdir -p target/sbom
      - run: cargo sbom --output-format spdx_json_2_3 > target/sbom/discrypt-rust.spdx.json
      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: npm
          cache-dependency-path: apps/ui/package-lock.json
      - run: npm ci
        working-directory: apps/ui
      - run: npm audit --audit-level=high --omit=dev
        working-directory: apps/ui
      - run: npm sbom --sbom-format spdx --sbom-type application > ../../target/sbom/discrypt-ui-npm.spdx.json
        working-directory: apps/ui
      - uses: actions/upload-artifact@v4
        with:
          name: discrypt-sbom
          path: target/sbom

  ui:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: npm
          cache-dependency-path: apps/ui/package-lock.json
      - run: npm ci
        working-directory: apps/ui
      - run: npm run build
        working-directory: apps/ui
      - run: npm run test:command-coverage
        working-directory: apps/ui
      - run: npm run test:honesty
        working-directory: apps/ui
      - run: npm run test:security-privacy-g009
        working-directory: apps/ui
      - run: npm run test:g010-adapter-public-matrix
        working-directory: apps/ui
      - run: npm run test:g010-release-contract
        working-directory: apps/ui
      - run: npm run test:no-placeholders-g127
        working-directory: apps/ui
      - run: npm run test:placeholder-allowlist-g128
        working-directory: apps/ui
      - run: npm run test:release-no-fallback-g129
        working-directory: apps/ui
      - run: npm run test:ui-integration-g130
        working-directory: apps/ui
      - run: npm run test:final-e2e-g131
        working-directory: apps/ui

  per27-public-mqtt-namespace:
    name: PER-27 public MQTT namespace proof
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: ${{ github.head_ref == 'multica/P3-T06-public-mqtt-two-machine-text-e2e' || github.ref_name == 'multica/P3-T06-public-mqtt-two-machine-text-e2e' }}
    env:
      DISCRYPT_PER27_ROOM: discrypt-per-27-mqtt-gha-${{ github.run_id }}-${{ github.run_attempt }}
      DISCRYPT_PER27_ARTIFACT_DIR: target/e2e/per-27-public-mqtt-gha-${{ github.run_id }}-${{ github.run_attempt }}
      DISCRYPT_PUBLIC_MQTT_ENDPOINT: mqtts://broker.emqx.io:8883
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.96.0
      - name: Record host namespace identity
        run: |
          mkdir -p "${DISCRYPT_PER27_ARTIFACT_DIR}"
          {
            echo "role=offerer-host-namespace"
            echo "runner_name=${RUNNER_NAME}"
            echo "runner_os=${RUNNER_OS}"
            echo "hostname=$(hostname)"
            echo "room=${DISCRYPT_PER27_ROOM}"
            echo "endpoint=${DISCRYPT_PUBLIC_MQTT_ENDPOINT}"
            ip route || true
          } > "${DISCRYPT_PER27_ARTIFACT_DIR}/offerer-host-namespace.txt"
      - name: Build split-machine proof example
        run: cargo build -p discrypt-transport --features mqtt-adapter --example split_machine_p2p
      - name: Run answerer in Docker network namespace and offerer on host
        run: |
          mkdir -p "${DISCRYPT_PER27_ARTIFACT_DIR}"
          docker run \
            --name discrypt-per27-answerer \
            --detach \
            --volume "$PWD:/work" \
            --workdir /work \
            --env DISCRYPT_PER27_ROOM \
            --env DISCRYPT_PER27_ARTIFACT_DIR \
            --env DISCRYPT_PUBLIC_MQTT_ENDPOINT \
            rust:1.96 \
            bash -lc '{
              echo "role=answerer-docker-network-namespace"
              echo "container_hostname=$(hostname)"
              echo "room=${DISCRYPT_PER27_ROOM}"
              echo "endpoint=${DISCRYPT_PUBLIC_MQTT_ENDPOINT}"
              ip route || true
            } > "${DISCRYPT_PER27_ARTIFACT_DIR}/answerer-docker-namespace.txt";
            target/debug/examples/split_machine_p2p \
              --adapter mqtt \
              --role answerer \
              --room "${DISCRYPT_PER27_ROOM}" \
              --endpoint "${DISCRYPT_PUBLIC_MQTT_ENDPOINT}" \
              --artifact-dir "${DISCRYPT_PER27_ARTIFACT_DIR}" \
              --answerer-hold-secs 120 \
              --receipt-timeout-secs 90'

          sleep 15
          set +e
          target/debug/examples/split_machine_p2p \
            --adapter mqtt \
            --role offerer \
            --room "${DISCRYPT_PER27_ROOM}" \
            --endpoint "${DISCRYPT_PUBLIC_MQTT_ENDPOINT}" \
            --artifact-dir "${DISCRYPT_PER27_ARTIFACT_DIR}" \
            --receipt-timeout-secs 90
          offerer_status=$?
          docker wait discrypt-per27-answerer > "${DISCRYPT_PER27_ARTIFACT_DIR}/answerer-docker-exit-code.txt"
          answerer_status=$(cat "${DISCRYPT_PER27_ARTIFACT_DIR}/answerer-docker-exit-code.txt")
          docker logs discrypt-per27-answerer > "${DISCRYPT_PER27_ARTIFACT_DIR}/answerer-docker.log" 2>&1 || true
          docker rm discrypt-per27-answerer
          set -e
          echo "offerer_status=${offerer_status}" > "${DISCRYPT_PER27_ARTIFACT_DIR}/offerer-exit-code.txt"
          echo "answerer_status=${answerer_status}" >> "${DISCRYPT_PER27_ARTIFACT_DIR}/offerer-exit-code.txt"
          test "${offerer_status}" -eq 0
          test "${answerer_status}" -eq 0
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: per27-public-mqtt-namespace-${{ github.run_id }}-${{ github.run_attempt }}
          path: target/e2e/per-27-public-mqtt-gha-${{ github.run_id }}-${{ github.run_attempt }}
