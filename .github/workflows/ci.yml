name: ci

on:
  push:
  pull_request:

jobs:
  rust:
    name: rust (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - run: cargo fmt --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo test --workspace

  android-check:
    name: android target check
    runs-on: ubuntu-latest
    env:
      ANDROID_NDK_VERSION: "28.0.13004108"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android
      - uses: android-actions/setup-android@v3
      - name: Install Android NDK for cargo target check
        run: |
          sdkmanager --install "ndk;${ANDROID_NDK_VERSION}"
          echo "ANDROID_NDK_HOME=${ANDROID_HOME}/ndk/${ANDROID_NDK_VERSION}" >> "$GITHUB_ENV"
          echo "NDK_HOME=${ANDROID_HOME}/ndk/${ANDROID_NDK_VERSION}" >> "$GITHUB_ENV"
      - run: cargo check --workspace --target aarch64-linux-android

  supply-chain:
    name: supply-chain
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v4
        with:
          path: ~/.cargo/bin
          key: cargo-tools-${{ runner.os }}-audit-deny-sbom-v1
      - name: Install supply-chain tools
        run: |
          cargo install cargo-audit --locked || true
          cargo install cargo-deny --locked || true
          cargo install cargo-sbom --locked || true
      - run: cargo audit
      - run: cargo deny check
      - run: mkdir -p target/sbom
      - run: cargo sbom --output-format spdx_json_2_3 > target/sbom/discrypt-rust.spdx.json
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/ui/package-lock.json
      - run: npm ci
        working-directory: apps/ui
      - run: npm audit --audit-level=high --omit=dev
        working-directory: apps/ui
      - run: npm sbom --sbom-format spdx --sbom-type application > ../../target/sbom/discrypt-ui-npm.spdx.json
        working-directory: apps/ui
      - uses: actions/upload-artifact@v4
        with:
          name: discrypt-sbom
          path: target/sbom

  ui:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/ui/package-lock.json
      - run: npm ci
        working-directory: apps/ui
      - run: npm run build
        working-directory: apps/ui
      - run: npm run test:command-coverage
        working-directory: apps/ui
      - run: npm run test:honesty
        working-directory: apps/ui
