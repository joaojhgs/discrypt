name: package desktop

on:
  workflow_dispatch:
    inputs:
      package_linux:
        description: Build Linux .deb/.rpm/AppImage artifacts
        type: boolean
        default: true
      package_macos:
        description: Build unsigned macOS artifacts on a macOS runner
        type: boolean
        default: true
      package_windows:
        description: Build unsigned Windows artifacts on a Windows runner
        type: boolean
        default: true
  pull_request:
    paths:
      - .github/workflows/package-desktop.yml
      - apps/desktop/src-tauri/**
      - apps/ui/**
      - scripts/*release*.mjs
      - scripts/*package*.mjs
      - scripts/*desktop*.mjs

jobs:
  validate-package-ci:
    name: validate package workflow
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/ui/package-lock.json
      - run: npm --prefix apps/ui ci
      - run: npm --prefix apps/ui run test:release-linux
      - run: npm --prefix apps/ui run test:linux-package-smoke
      - run: npm --prefix apps/ui run test:desktop-package-ci

  package-linux:
    name: package Linux
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.package_linux }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/ui/package-lock.json
      - name: Install Linux Tauri build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            rpm
      - run: npm --prefix apps/ui run release:linux
      - run: npm --prefix apps/ui run smoke:linux-packages
      - uses: actions/upload-artifact@v4
        with:
          name: discrypt-linux-packages
          path: |
            target/release/bundle/deb/*.deb
            target/release/bundle/rpm/*.rpm
            target/release/bundle/appimage/*.AppImage

  package-macos:
    name: package macOS
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.package_macos }}
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/ui/package-lock.json
      - run: npm --prefix apps/ui ci
      - run: npm --prefix apps/ui run test:honesty
      - run: npm --prefix apps/ui run test:command-coverage
      - run: npm --prefix apps/ui run build
      - name: Build unsigned macOS package artifacts
        run: >
          npx --yes @tauri-apps/cli@2.11.2 build
          --config apps/desktop/src-tauri/tauri.conf.json
          --features tauri-runtime,production-network,production-media
      - uses: actions/upload-artifact@v4
        with:
          name: discrypt-macos-packages
          path: |
            target/release/bundle/macos/**
            target/release/bundle/dmg/*.dmg

  package-windows:
    name: package Windows
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.package_windows }}
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/ui/package-lock.json
      - run: npm --prefix apps/ui ci
      - run: npm --prefix apps/ui run test:honesty
      - run: npm --prefix apps/ui run test:command-coverage
      - run: npm --prefix apps/ui run build
      - name: Build unsigned Windows package artifacts
        run: >
          npx --yes @tauri-apps/cli@2.11.2 build
          --config apps/desktop/src-tauri/tauri.conf.json
          --features tauri-runtime,production-network,production-media
      - uses: actions/upload-artifact@v4
        with:
          name: discrypt-windows-packages
          path: |
            target/release/bundle/nsis/*.exe
            target/release/bundle/msi/*.msi
