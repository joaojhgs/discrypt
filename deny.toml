[advisories]
version = 2
yanked = "deny"
ignore = [
  # Transitive through openmls_rust_crypto -> hpke-rs -> libcrux; no safe
  # upgrade is available. Tracked in docs/security/g122-rust-advisory-waivers.md.
  "RUSTSEC-2026-0173",
]

[licenses]
version = 2
confidence-threshold = 0.8
allow = ["MIT", "Apache-2.0", "BSD-2-Clause", "BSD-3-Clause", "Unicode-3.0", "AGPL-3.0-or-later", "MPL-2.0", "ISC"]

[bans]
multiple-versions = "warn"
wildcards = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
